body:
  text: 續齊諧記小說家𩔖二異聞之屬提要臣等謹案續齊諧記一卷梁吴均撰均事迹具見梁書本傳唐書藝文志作吳筠案唐有道士呉筠乃大厯時人是書隋志著録杜公瞻荆楚歲時記注歐陽詢藝文𩔖聚已先引其文非筠明甚唐志葢傳冩之訛呉琯刋本有元陸友跋曰齊諧志怪葢莊生寓言今均所續特取義云爾前無其書也案隋書經籍志雜傳𩔖均書之前有宋散騎侍郎東陽無疑齊諧記七卷唐志小説家亦並載之然則均書實續無疑友謂前無其書亦為失考所記皆神怪之説然李善注文選于陸機豫章行引其田氏三荆𣗳一條於謝惠連七月七日夜詠牛女詩引其成武丁一條韋絢劉禹錫嘉話引其霍光金鳯轄一條蔣潛通天犀導一條張彦遠厯代名畫記引其徐邈畫鯔魚一條是在唐時已援為典據亦小説之表表者矣惟劉阮天台一事徐子光注李瀚蒙求引續齊諧記之文述其始末甚偹而今本無此條豈原書久佚後人於太平廣記諸書内抄合成編故偶有遺漏歟乾隆四十二年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:0d26557ff3e2268685107fb1e3a8c7b67b29fb5a41e6a141e5a7b3f78ccf637b
