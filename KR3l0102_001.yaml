  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0102_WYG_001-1a, image: WYG1042/WYG1042-0554c.png}
body:
  text: 續齊諧記梁吳均撰漢宣帝以皂蓋車一乘賜大將軍霍光悉以金鉸具至夜車轄上金鳳皇輒亡去莫知所之至曉乃還如此非一守車人亦嘗見後南郡黃君仲北山羅鳥得鳳皇入手即化成紫金毛羽冠翅宛然具足可長尺餘守車人列上云今月十二日夜車轄上鳳凰俱飛去曉則俱還今則不返恐為人所得光甚異之具以列上後數日君仲詣闕上鳳皇子云今月十二夜北山羅鳥所得帝聞而疑之置承露盤上俄而飛去帝使尋之直入光家止車轄上乃知信然帝取其車每遊行即乘御之至帝崩鳳皇飛去莫知所在嵇康詩云翩翩鳳轄逢此網羅京兆田真兄弟三人共議分財生資皆平均惟堂前一株紫荆樹共議欲破三片明日就截之其樹即枯死狀如火燃真往見之大驚謂諸弟曰樹本同株聞將分斫所以憔悴是人不如木也因悲不自勝不復解樹樹應聲榮茂兄弟相感合財寶遂為孝門真仕至太中大夫陸機詩云三荆歡同株𢎞農楊寶性慈愛年九歲至華陰山見一黃雀為鴟梟所搏逐樹下傷瘢甚多宛轉復為螻蟻所困寶懷之以歸置諸梁上夜聞啼聲甚切親自照視為蚊所嚙乃移置巾箱中啖以黃花逮十餘日毛羽成飛翔朝去暮來宿巾箱中如此積年忽與羣雀俱來哀鳴繞屋數日乃去是夕寶三更讀書有黃衣童子曰我王母使者昔使蓬萊為鴟梟所搏蒙君之仁愛見救今當受賜南海别以四玉環與之曰令君子孫潔白且從登三公事如此環矣寶之孝大聞天下名位日隆子震震生秉秉生彪四世名公及震葬時有大鳥降人皆謂真孝昭也蔡雍論云昔日黃雀報恩而至魏明帝遊洛水水中有白獺數頭美靜可憐見人輒去帝欲見之終莫能遂侍中徐景山曰獺嗜鯔魚乃不避死畫板作兩生鯔魚懸置岸上於是羣獺競逐一時執得帝甚佳之曰聞卿善畫何其妙也答曰臣亦未嘗執筆然人之所目可庶幾耳帝曰是善用所長顔公庭誥云徐景山之畫獺是也張華為司空於時燕昭王墓前有一斑狸化為書生欲詣張公過問墓前華表曰以我才貌可得見司空耶華表曰子之妙解無為不可但張公制度恐難籠絡出必遇辱殆不得返非但喪子千年之質亦當深誤老表狸不從遂詣華華見其容止風流雅重之於是論及文章聲實華未嘗勝次復商略三史探貫百氏包十聖洞三才華無不應聲屈滯乃歎曰明公乃尊賢容衆嘉善矜不能奈何憎人學問墨子兼愛其善是也言卒便退華已使人防門不得出既而又問華曰公門置兵甲蘭錡當是疑僕也恐天下之人卷舌而不談知謀之士望門而不進深為明公惜之華不答而使人防禦甚嚴豐城令雷煥博物士也謂華曰聞魅鬼忌狗所别者數百年物耳千年老精不復能别惟千年枯木照之則形見昭王墓前華表已當千年使人伐之至聞華表言曰老狸不自知果誤我事於華表穴中得青衣小兒長二尺餘使還未至洛陽而變成枯木遂燃以照之書生乃是一斑狸茂先歎曰此二物不值我千年不復可得東海蔣潛嘗至不其縣路次林中露一尸已自臭爛鳥來食之輒見一小兒長三尺驅鳥鳥即起如此非一潛異之看見尸頭上著通天犀纛揣其價可數萬錢潛乃拔取既去見衆鳥集無復驅者潛後以此纛上晉武陵王晞晞薨以襯衆僧王武剛以九萬錢買之後落褚太宰處復以餉齊故丞相豫章王王薨後內人江夫人遂斷以為叉每夜輒見一兒繞牀啼叫云何為見屠割必訴天當相報江夫人惡之月餘乃亡桓𤣥篡位後來朱雀門中忽見兩小兒通身如墨相和作籠歌路邊小兒從而和之者數十人歌云芒籠茵繩縛腹車無軸倚孤木聲甚哀促無歸日既夕二小兒入建康縣至閣下遂成雙漆鼓槌吏列云槌積久比恆失之而復得之不意作人也明年春而桓敗車無軸倚孤木桓字也荆州送𤣥首用敗籠茵包之又芒繩束縛其尸沈諸江中悉如所歌焉陽羡許彥相綏安山行遇一書生年十七八臥側云腳痛求寄鵝籠中彥以為戲言書生便入籠籠亦不更廣書生亦不更小宛然與雙鵝並坐鵝亦不驚彥負籠而去都不覺重前行息樹下書生乃出籠謂彥曰欲為君薄設彥曰善乃口中吐出一銅奩子奩子中具諸飾饌珍羞方丈其器皿皆銅物氣味香㫖世所罕見酒數行謂彥曰向將一婦人自隨今欲暫邀之彥曰善又於口中吐一女子年可十五六衣服綺麗容貌殊絶共坐宴俄而書生醉臥此女謂彥曰雖與書生結妻而實懷怨向亦竊得一男子同行書生既眠暫喚之君幸勿言彥曰善女子於口中吐出一男子年可二十三四亦穎悟可愛乃與彥叙寒溫書生臥欲覺女子口吐一錦行障遮書生書生乃留女子共臥男子謂彥曰此女子雖有心情亦不甚向復竊得一女人同行今欲暫見之願君勿泄彥曰善男子又於口中吐一婦人年可二十許共酌戲談甚久聞書生動聲男子曰二人眠已覺因取所吐女人還納口中須臾書生處女乃出謂彥曰書生欲起乃吞向男子獨對彥坐然後書生起謂彥曰暫眠遂久君獨坐當悒悒邪日又晚當與君别遂吞其女子諸器皿悉納口中留大銅盤可二尺廣與彥别曰無以藉君與君相憶也彥太元中為蘭臺令史以盤餉侍中張散散看其銘題云是永平三年作汝南桓景隨費長房遊學纍年長房謂曰九月九日汝家中當有災宜急去令家人各作絳囊盛茱萸以繫臂登高飲菊花酒此禍可除景如言齊家登山夕還見雞犬牛羊一時暴死長房聞之曰此可代也今世人九日登高飲酒婦人帶茱萸囊蓋始於此晉武帝問尚書郎摯虞仲治三月三日曲水其義何旨答曰漢章帝時平原徐肇以三月初生三女至三日俱亡一村以為怪乃相與至水濱盥洗因流以濫觴曲水之義蓋自此矣帝曰若如所談便非嘉事也尚書郎束晳進曰摯虞小生不足以知此臣請說其始昔周公成洛邑因流水泛酒故逸詩云羽觴隨波流又秦昭王三月上已置酒河曲見金人自河而出奉水心劍曰令君制有西夏及秦霸諸侯乃因此處立為曲水二漢相緣皆為盛集帝曰善賜金五十斤左遷仲治為城陽令桂陽成武丁有仙道常在人間忽謂其弟曰七月七日織女當渡河諸仙悉還宫吾向已被召不得停與爾别矣弟問曰織女何事渡河去當何還答曰織女暫詣牽牛吾復三年當還明日失武丁至今云織女嫁牽牛𢎞農鄧紹嘗八月旦入華山采藥見一童子執五彩囊承柏葉上露皆如珠滿囊紹問曰用此何為答曰赤松先生取以明目言終便失所在今世人八月旦作眼明袋此遺象也屈原五月五日投汨羅水楚人哀之至此日以竹筒子貯米投水以祭之漢建武中長沙區曲忽見一士人自云三閭大夫謂曲曰聞君當見祭甚善常年為蛟龍所竊今若有惠當以楝葉塞其上以彩絲纏之此二物蛟龍所憚曲依其言今五月五日作粽并帶楝葉五花絲遺風也吳縣張成夜起忽見一婦人立於宅上南角舉手招成成即就之婦人曰此地是君家𧖟室我即是此地之神明年正月半宜作白粥泛膏於上祭我也必當令君𧖟桑百倍言絶失之成如言作膏粥自此後大得𧖟今正月半作白膏粥自此始也吳興故鄴縣東三十里有梅溪山山根直豎一石可髙百餘丈至青而圓如兩間屋大四面斗絶仰之於雲外無登陟之理其上復有盤石圓如車蓋恆轉如磨聲若風雨土人號為石磨轉快則年豐轉遲則歲儉欲知年之豐儉驗之無失錢塘徐秋夫善治病宅在湖溝橋東夜聞空中呻吟聲甚苦秋夫起至呻吟處問曰汝是鬼邪何為如此饑寒須衣食邪抱病須治療邪鬼曰我是東陽人姓斯名僧平昔為樂游吏患腰痛死今在湖北雖為鬼苦亦如生為君善醫故來相告秋夫曰但汝無形何由治鬼曰但縛茅作人按穴針之訖棄流水中可也秋夫作茅人為針腰目二處并復薄祭遣人送後湖中及暝夢鬼曰已差并承惠食感君厚意秋夫宋元嘉六年為奉朝請會稽趙文韶為東宫扶侍住青溪中橋與尚書王叔卿家隔一巷相去二百步許秋夜嘉月悵然思歸倚門唱西夜烏飛其聲甚哀怨忽有青衣婢年十五六前曰王家娘子白扶侍聞君歌聲有門人逐月遊戲遣相聞耳時未息文韶不之疑委曲答之亟邀相過須臾女到年十八九行步容色可憐猶將兩婢自隨問家在何處舉手指王尚書宅曰是聞君歌聲故來相詣豈能為一曲邪文韶即為歌草生盤石音韻清暢又深會女心乃曰但令有瓶何患不得水顧謂婢子還取箜篌為扶侍鼓之須臾至女為酌兩三彈泠泠更增楚絶乃令婢子歌繁霜自解裙帶繫箜篌腰叩之以倚歌歌曰日暮風吹葉落依枝丹心寸意愁君未知歌繁霜侵曉幕何意空相守坐待繁霜落歌闋夜已久遂相佇燕寢竟四更别去脫金簪以贈文韶文韶亦答以銀碗白琉璃匕各一枚既明文韶出偶至清溪廟歇神坐上見碗甚疑而委悉之屏風後則琉璃匕在焉箜篌帶縛如故祠廟中惟女姑神像青衣婢立在前細視之皆夜所見者於是遂絶當宋元嘉五年也齊諧志怪者也蓋莊生寓言耳今吳均所續特取義云耳前無其書也考文獻通考書目亦云至元甲子吳郡陸友記續齊諧記
